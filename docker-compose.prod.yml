services:
  postgres:
    image: postgres:15-alpine
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-airticket}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-airticket}
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPEN_WEATHER_API_KEY: ${OPEN_WEATHER_API_KEY:-}
      NEWSDATA_API_KEY: ${NEWSDATA_API_KEY:-}
      NEWSDATAIO_API_KEY: ${NEWSDATAIO_API_KEY:-}
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/airticket}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      APP_AUTH_JWT_SECRET: ${APP_AUTH_JWT_SECRET:?Ban_can_cau_hinh_APP_AUTH_JWT_SECRET}
      APP_AUTH_JWT_ISSUER: ${APP_AUTH_JWT_ISSUER:-airticket-api}
      APP_AUTH_JWT_ACCESS_TOKEN_TTL_SECONDS: ${APP_AUTH_JWT_ACCESS_TOKEN_TTL_SECONDS:-900}
      APP_AUTH_JWT_REFRESH_TOKEN_TTL_SECONDS: ${APP_AUTH_JWT_REFRESH_TOKEN_TTL_SECONDS:-2592000}
      APP_AUTH_OAUTH_FRONTEND_CALLBACK_URL: ${APP_AUTH_OAUTH_FRONTEND_CALLBACK_URL:-http://localhost:3000/oauth/callback}
      APP_AUTH_OAUTH_STATE_TTL_SECONDS: ${APP_AUTH_OAUTH_STATE_TTL_SECONDS:-300}
      APP_AUTH_OAUTH_EXCHANGE_CODE_TTL_SECONDS: ${APP_AUTH_OAUTH_EXCHANGE_CODE_TTL_SECONDS:-180}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8080/api/auth/oauth/google/callback}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://127.0.0.1:3000}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_MAIL_CONNECTION_TIMEOUT: ${SPRING_MAIL_CONNECTION_TIMEOUT:-5000}
      SPRING_MAIL_TIMEOUT: ${SPRING_MAIL_TIMEOUT:-5000}
      SPRING_MAIL_WRITE_TIMEOUT: ${SPRING_MAIL_WRITE_TIMEOUT:-5000}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_FROM_EMAIL: ${APP_MAIL_FROM_EMAIL:-}
      APP_PAYMENT_SEPAY_TOKEN: ${APP_PAYMENT_SEPAY_TOKEN:-${SEPAY_API_TOKEN:-}}
      APP_PAYMENT_SEPAY_BANK_ACCOUNT_ID: ${APP_PAYMENT_SEPAY_BANK_ACCOUNT_ID:-${SEPAY_BANK_ACCOUNT_UUID:-}}
      APP_PAYMENT_SEPAY_WEBHOOK_API_KEY: ${APP_PAYMENT_SEPAY_WEBHOOK_API_KEY:-${SEPAY_WEBHOOK_API_KEY:-}}
      APP_PAYMENT_SEPAY_BANK_NAME: ${APP_PAYMENT_SEPAY_BANK_NAME:-${SEPAY_BANK_NAME:-BIDV}}
      APP_PAYMENT_SEPAY_ACCOUNT_NUMBER: ${APP_PAYMENT_SEPAY_ACCOUNT_NUMBER:-${SEPAY_ACCOUNT_NUMBER:-}}
      APP_PAYMENT_SEPAY_ACCOUNT_HOLDER_NAME: ${APP_PAYMENT_SEPAY_ACCOUNT_HOLDER_NAME:-${SEPAY_ACCOUNT_NAME:-}}
      APP_PAYMENT_SEPAY_ORDER_DURATION_SECONDS: ${APP_PAYMENT_SEPAY_ORDER_DURATION_SECONDS:-${SEPAY_ORDER_DURATION_SECONDS:-900}}
      APP_PAYMENT_SEPAY_API_BASE_URL: ${APP_PAYMENT_SEPAY_API_BASE_URL:-${SEPAY_API_BASE_URL:-https://userapi.sepay.vn/v2}}
      APP_PAYMENT_SEPAY_QR_BASE_URL: ${APP_PAYMENT_SEPAY_QR_BASE_URL:-${SEPAY_QR_BASE_URL:-https://qr.sepay.vn/img}}
      SEPAY_API_TOKEN: ${SEPAY_API_TOKEN:-}
      SEPAY_BANK_ACCOUNT_UUID: ${SEPAY_BANK_ACCOUNT_UUID:-}
      SEPAY_WEBHOOK_API_KEY: ${SEPAY_WEBHOOK_API_KEY:-}
      SEPAY_BANK_NAME: ${SEPAY_BANK_NAME:-}
      SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
      SEPAY_ACCOUNT_NAME: ${SEPAY_ACCOUNT_NAME:-}
      SEPAY_ORDER_DURATION_SECONDS: ${SEPAY_ORDER_DURATION_SECONDS:-}
      SEPAY_API_BASE_URL: ${SEPAY_API_BASE_URL:-}
      SEPAY_QR_BASE_URL: ${SEPAY_QR_BASE_URL:-}
      APP_UPLOAD_AVATAR_DIR: ${APP_UPLOAD_AVATAR_DIR:-uploads/avatars}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8080/api/meta/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
