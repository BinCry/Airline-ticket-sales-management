name: deploy-production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test-api:
    name: test-api
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Chạy kiểm thử backend
        working-directory: apps/api
        run: mvn -B test

  build-api:
    name: build-api
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Biên dịch backend
        working-directory: apps/api
        run: mvn -B -DskipTests package

  test-web:
    name: test-web
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependency
        run: npm ci

      - name: Chạy kiểm thử web
        working-directory: apps/web
        run: npm exec vitest -- --configLoader runner --run

  build-web:
    name: build-web
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependency
        run: npm ci

      - name: Biên dịch web
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.airplane.id.vn
        run: npm run build

  validate-production-config:
    name: validate-production-config
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependency
        run: npm ci

      - name: Kiểm tra cấu hình production
        shell: pwsh
        run: ./infra/scripts/kiem-tra-san-sang-production.ps1

  verify-images:
    name: verify-images
    runs-on: ubuntu-latest
    needs:
      - build-api
      - build-web
      - validate-production-config

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependency cho image web
        run: npm ci

      - name: Build image web
        run: docker build --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.airplane.id.vn -f apps/web/Dockerfile .

      - name: Build image api
        run: docker build -f apps/api/Dockerfile apps/api

  sync-deploy-branch:
    name: sync-deploy-branch
    runs-on: ubuntu-latest
    needs:
      - test-api
      - test-web
      - verify-images
      - validate-production-config

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Đồng bộ main sang deploy
        run: |
          git config --global user.name "deploy-bot"
          git config --global user.email "deploy@bot.com"
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/deploy; then
            git checkout -B deploy origin/deploy
          else
            git checkout -b deploy
          fi
          git merge origin/main --no-edit
          git push origin deploy
