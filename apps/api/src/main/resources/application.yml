spring:
  application:
    name: airticket-api
  mvc:
    throw-exception-if-no-handler-found: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/airticket}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
          timeout: ${SPRING_MAIL_TIMEOUT:5000}
          writetimeout: ${SPRING_MAIL_WRITE_TIMEOUT:5000}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
        format_sql: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080

app:
  title: Vietnam Airlines API
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000}
  auth:
    jwt:
      issuer: ${APP_AUTH_JWT_ISSUER:airticket-api}
      secret: ${APP_AUTH_JWT_SECRET:doi-secret-toi-thieu-32-ky-tu-cho-local-airticket}
      access-token-ttl-seconds: ${APP_AUTH_JWT_ACCESS_TOKEN_TTL_SECONDS:900}
      refresh-token-ttl-seconds: ${APP_AUTH_JWT_REFRESH_TOKEN_TTL_SECONDS:900}
    otp:
      password-reset-ttl-seconds: ${APP_AUTH_OTP_PASSWORD_RESET_TTL_SECONDS:300}
      max-attempts: ${APP_AUTH_OTP_MAX_ATTEMPTS:5}
    oauth:
      frontend-callback-url: ${APP_AUTH_OAUTH_FRONTEND_CALLBACK_URL:http://localhost:3000/oauth/callback}
      state-ttl-seconds: ${APP_AUTH_OAUTH_STATE_TTL_SECONDS:300}
      exchange-code-ttl-seconds: ${APP_AUTH_OAUTH_EXCHANGE_CODE_TTL_SECONDS:180}
      google:
        client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
        client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
        redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/auth/oauth/google/callback}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from-email: ${APP_MAIL_FROM_EMAIL:${SPRING_MAIL_USERNAME:}}
  payment:
    sepay:
      token: ${APP_PAYMENT_SEPAY_TOKEN:${SEPAY_API_TOKEN:}}
      bank-account-id: ${APP_PAYMENT_SEPAY_BANK_ACCOUNT_ID:${SEPAY_BANK_ACCOUNT_UUID:}}
      webhook-api-key: ${APP_PAYMENT_SEPAY_WEBHOOK_API_KEY:${SEPAY_WEBHOOK_API_KEY:}}
      bank-name: ${APP_PAYMENT_SEPAY_BANK_NAME:${SEPAY_BANK_NAME:BIDV}}
      account-number: ${APP_PAYMENT_SEPAY_ACCOUNT_NUMBER:${SEPAY_ACCOUNT_NUMBER:}}
      account-holder-name: ${APP_PAYMENT_SEPAY_ACCOUNT_HOLDER_NAME:${SEPAY_ACCOUNT_NAME:}}
      order-duration-seconds: ${APP_PAYMENT_SEPAY_ORDER_DURATION_SECONDS:${SEPAY_ORDER_DURATION_SECONDS:900}}
      api-base-url: ${APP_PAYMENT_SEPAY_API_BASE_URL:${SEPAY_API_BASE_URL:https://userapi.sepay.vn/v2}}
      qr-base-url: ${APP_PAYMENT_SEPAY_QR_BASE_URL:${SEPAY_QR_BASE_URL:https://qr.sepay.vn/img}}
  upload:
    avatar-dir: ${APP_UPLOAD_AVATAR_DIR:uploads/avatars}

logging:
  level:
    root: info
    com.qlvmb.airticket: info
